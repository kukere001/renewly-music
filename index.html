<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RenewlyMusic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="max-w-6xl mx-auto p-6">
  <h1 class="text-5xl font-bold text-center mb-10">RenewlyMusic</h1>

  <div class="max-w-2xl mx-auto mb-10">
    <input id="search-input" placeholder="madk1d, kai angel, гимн россии..." 
           class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-6 px-8 text-xl">
    <button onclick="searchMusic()" 
            class="mt-4 w-full bg-gradient-to-r from-orange-500 to-red-500 py-5 rounded-3xl text-xl font-bold">
      Искать
    </button>
  </div>

  <div id="results" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
</div>

<!-- ПЛЕЕР -->
<div id="player-bar" class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-white/10 hidden z-50">
  <div class="max-w-6xl mx-auto p-4 relative">
    
    <button onclick="toggleMiniPlayer()" 
            class="absolute -top-3 right-4 bg-zinc-800 hover:bg-zinc-700 text-white w-8 h-8 rounded-full flex items-center justify-center text-xl">
      ↓
    </button>

    <div id="embed-container"></div>
  </div>
</div>

<script>
  const CLIENT_ID = "RF8yvumNwWwVg0aX4r7fHqzIVAtO6nSI";

  async function searchMusic() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    const div = document.getElementById('results');
    div.innerHTML = `<p class="col-span-full text-center py-20 text-zinc-400">Ищем...</p>`;

    try {
      const res = await fetch(`https://corsproxy.io/?https://api-v2.soundcloud.com/search?q=${encodeURIComponent(query)}&client_id=${CLIENT_ID}&limit=30`);
      const data = await res.json();

      let html = '';
      data.collection.forEach(item => {
        if (item.kind === "track") {
          html += `
            <div onclick="play('${item.permalink_url}')" 
                 class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer hover:scale-105 transition-all">
              <img src="${item.artwork_url.replace('-large', '-t500x500')}" class="w-full aspect-square object-cover">
              <div class="p-4">
                <div class="font-medium line-clamp-2">${item.title}</div>
                <div class="text-zinc-400 text-sm">${item.user.username}</div>
              </div>
            </div>`;
        }
      });
      div.innerHTML = html || `<p class="col-span-full text-center text-zinc-400">Ничего не найдено</p>`;
    } catch(e) {
      div.innerHTML = `<p class="col-span-full text-center text-red-400">Ошибка соединения<br>Попробуй другой запрос</p>`;
    }
  }

  function play(url) {
    const embedUrl = `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23f97316&auto_play=true&visual=false&single_active=true&height=280`;
    
    document.getElementById('embed-container').innerHTML = `
      <iframe width="100%" height="280" scrolling="no" frameborder="no" 
              src="${embedUrl}" allow="autoplay"></iframe>`;
    
    document.getElementById('player-bar').classList.remove('hidden');
  }

  function toggleMiniPlayer() {
    const player = document.getElementById('player-bar');
    if (player.classList.contains('h-14')) {
      player.classList.remove('h-14');
      player.style.height = '';
    } else {
      player.classList.add('h-14');
      player.style.height = '56px';
      document.getElementById('embed-container').style.display = 'none';
    }
  }

  function closePlayer() {
    document.getElementById('player-bar').classList.add('hidden');
  }
</script>
</body>
</html>
