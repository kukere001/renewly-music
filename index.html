<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RenewlyMusic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <div class="max-w-5xl mx-auto p-6">

    <h1 class="text-5xl font-bold text-center mb-10 neon">RenewlyMusic</h1>

    <div class="max-w-xl mx-auto">
      <input id="search-input" placeholder="kai angel, romance, 9mice..." 
             class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-6 px-8 text-xl mb-4">
      <button onclick="searchMusic()" 
              class="w-full bg-gradient-to-r from-orange-500 to-red-500 py-5 rounded-3xl text-xl font-bold">
        Искать
      </button>
    </div>

    <div id="results" class="mt-10 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </div>

  <!-- Плеер -->
  <div id="player" class="fixed bottom-0 left-0 right-0 bg-zinc-900 p-4 hidden">
    <div class="max-w-5xl mx-auto flex items-center gap-4">
      <img id="cover" class="w-16 h-16 rounded-2xl">
      <div class="flex-1">
        <div id="title" class="font-bold"></div>
        <div id="artist" class="text-zinc-400"></div>
      </div>
      <button onclick="togglePlay()" id="playpause" class="text-4xl">▶</button>
    </div>
  </div>

<script>
  const CLIENT_ID = "RF8yvumNwWwVg0aX4r7fHqzIVAtO6nSI";
  const CORS_PROXY = "https://corsproxy.io/?";

  async function searchMusic() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = `<p class="text-center text-zinc-400">Ищем...</p>`;

    try {
      const url = `${CORS_PROXY}https://api-v2.soundcloud.com/search?q=${encodeURIComponent(query)}&client_id=${CLIENT_ID}&limit=20`;
      const res = await fetch(url);
      const data = await res.json();

      let html = '';
      data.collection.forEach(item => {
        if (item.kind === "track") {
          html += `
            <div onclick="play('${item.id}', '${item.title}', '${item.user.username}', '${item.artwork_url}')" 
                 class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer hover:scale-105 transition">
              <img src="${item.artwork_url.replace('-large', '-t500x500')}" class="w-full aspect-square object-cover">
              <div class="p-4">
                <div class="font-medium line-clamp-2">${item.title}</div>
                <div class="text-sm text-zinc-400">${item.user.username}</div>
              </div>
            </div>`;
        }
      });
      resultsDiv.innerHTML = html || "<p class='text-center'>Ничего не найдено</p>";
    } catch(e) {
      resultsDiv.innerHTML = `<p class="text-red-400 text-center">Ошибка прокси. Попробуй позже.</p>`;
    }
  }

  async function play(id, title, artist, artwork) {
    const proxyUrl = `${CORS_PROXY}https://api-v2.soundcloud.com/tracks/${id}/streams?client_id=${CLIENT_ID}`;
    const res = await fetch(proxyUrl);
    const data = await res.json();
    const streamUrl = data.http_mp3_128_url;

    if (streamUrl) {
      const audio = new Audio(streamUrl);
      audio.play();

      document.getElementById('cover').src = artwork.replace('-large', '-t500x500');
      document.getElementById('title').textContent = title;
      document.getElementById('artist').textContent = artist;
      document.getElementById('player').classList.remove('hidden');
    }
  }

  function togglePlay() {
    alert("Плеер в разработке. Сейчас просто играет трек.");
  }
</script>
</body>
</html>
